<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Library</h1>
            <button id="new-book-button">Add New Book</button>
        </div>
    </header>

    <main>
        <div id="library-container"></div>
    </main>

    <dialog id="book-dialog">
        <form id="book-form">
            <h2>Add a New Book</h2>

            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" name="title" id="title" required>
            </div>

            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" name="author" id="author" required>
            </div>

            <div class="form-group">
                <label for="pages">Pages:</label>
                <input type="text" name="pages" id="pages" required min="1">
            </div>

            <div class="form-group">
                <label for="isRead"></label>
                <input type="checkbox" name="isRead" id="isRead">
            </div>

            <div class="form-actions">
                <button type="button" id="close-dialog-button">Cancel</button>
                <button type="submit">Add Book</button>
            </div>
        </form>
    </dialog>
</body>
</html>
